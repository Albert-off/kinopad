<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOPAD</title>
    <style>
        body { 
            background-color: #0A0A0C; 
            color: #E5E5EA; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, sans-serif;
            margin: 0; 
            padding: 24px 16px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        h1 { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 28px; 
            color: #FFFFFF; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        /* Максимальная ширина контейнера 1280px */
        .container { width: 100%; max-width: 1280px; }
        
        /* Группировка сериалов (Современная темная карточка с тенью) */
        .show-section { 
            margin-bottom: 32px; 
            background: #1C1C1E; 
            padding: 20px; 
            border-radius: 14px; 
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            border: 1px solid #2C2C2E;
        }
        
        .show-title { 
            font-size: 22px; 
            font-weight: 700;
            color: #FF9500; 
            margin: 0 0 14px 0; 
            border-bottom: 1px solid #2C2C2E; 
            padding-bottom: 8px; 
        }
        
        .season-title { 
            font-size: 15px; 
            color: #0A84FF; 
            margin: 18px 0 8px 0; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Строка эпизода (Более контрастный фон и увеличенные отступы) */
        .episode-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #2C2C2E; 
            padding: 14px 16px; 
            margin: 10px 0; 
            border-radius: 10px;
            border: 1px solid #3A3A3C;
        }
        
        /* Текстовый блок (серия + ссылка) */
        .episode-text-block {
            display: flex;
            flex-direction: column;
            padding-right: 16px;
            flex: 1;
        }
        
        .episode-info-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .episode-info { 
            font-size: 17px; 
            font-weight: 600; 
            color: #FFFFFF; 
        }
        
        /* Компактный маркер статуса */
        .status-badge {
            font-size: 12px;
            margin-left: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            background-color: #48484A;
            color: #AEAEB2;
            display: inline-block;
        }
        .status-badge.watching {
            background-color: rgba(255, 149, 0, 0.15);
            color: #FF9500;
        }
        .status-badge.watched {
            background-color: rgba(48, 209, 88, 0.15);
            color: #30D158;
        }
        
        .episode-link-preview {
            font-size: 12px;
            color: #AEAEB2;
            word-break: break-all;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        
        /* Блок с датой */
        .episode-date {
            font-size: 11px;
            color: #636366;
        }
        
        /* Кнопки управления (Абсолютный натив под iOS с полужирным шрифтом) */
        .btn-group { 
            display: flex; 
            align-items: center; 
            flex-shrink: 0; 
        }
        
        .btn { 
            background-color: #0A84FF; 
            color: #FFFFFF; 
            border: none; 
            padding: 12px 18px; 
            margin-left: 10px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 600; /* Полужирный текст кнопок */
            cursor: pointer;
            text-decoration: none;
            -webkit-appearance: none; 
            transition: background-color 0.2s;
        }
        
        /* Современные приглушенные оттенки для темной темы */
        .btn-copy { 
            background-color: #30D158; 
            color: #FFFFFF;
        }
        
        .loading { 
            color: #8E8E93; 
            font-size: 16px; 
            margin-top: 30px; 
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Kinopad</h1>
    <div class="container" id="content">
        <div class="loading">Загрузка эпизодов...</div>
    </div>

<script>
    var API_URL = "https://albertaudley.pythonanywhere.com/get_episodes";

    // Безопасное форматирование даты старыми методами работы со строками
    function formatDisplayDate(dateStr) {
        if (!dateStr) return "";
        try {
            var parts = dateStr.split(/[- :]/);
            if (parts.length >= 5) {
                // Возвращает в виде DD.MM.YYYY H:MM
                return parts[2] + "." + parts[1] + "." + parts[0] + " " + parts[3] + ":" + parts[4];
            }
            return dateStr;
        } catch (e) {
            return dateStr;
        }
    }

    function loadData() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", API_URL, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    renderList(data);
                } else {
                    document.getElementById("content").innerHTML = "<div class='loading'>Ошибка загрузки данных с сервера.</div>";
                }
            }
        };
        xhr.send();
    }

    function renderList(episodes) {
        var contentDiv = document.getElementById("content");
        if (episodes.length === 0) {
            contentDiv.innerHTML = "<div class='loading'>Эпизодов пока нет.</div>";
            return;
        }

        var html = "";
        var currentShow = "";
        var currentSeason = "";

        for (var i = 0; i < episodes.length; i++) {
            var ep = episodes[i];

            // Разделение по Сериалам
            if (currentShow !== ep.show_name) {
                if (currentShow !== "") { html += "</div>"; } 
                currentShow = ep.show_name;
                currentSeason = ""; 
                html += "<div class='show-section'><h2 class='show-title'>" + currentShow + "</h2>";
            }

            // Разделение по Сезонам внутри сериала
            if (currentSeason !== ep.season) {
                currentSeason = ep.season;
                html += "<div class='season-title'>" + currentSeason + "</div>";
            }

            // Логика отображения текстового статуса
            var statusClass = "";
            var statusText = "Не посмотрено";
            var statusValue = ep.status || "не посмотрел";

            if (statusValue === "смотрю") {
                statusClass = " watching";
                statusText = "👀 Смотрю";
            } else if (statusValue === "смотрел") {
                statusClass = " watched";
                statusText = "✅ Посмотрено";
            }

            var formattedDate = formatDisplayDate(ep.updated_at);

            html += "<div class='episode-row'>" +
                        "<div class='episode-text-block'>" +
                            "<div class='episode-info-wrapper'>" +
                                "<div class='episode-info'>" + ep.episode_number + "</div>" +
                                "<div class='status-badge" + statusClass + "'>" + statusText + "</div>" +
                            "</div>" +
                            "<div class='episode-link-preview'>" + ep.link + "</div>" +
                            (formattedDate ? "<div class='episode-date'>🕒 " + formattedDate + "</div>" : "") +
                        "</div>" +
                        "<div class='btn-group'>" +
                            "<button class='btn btn-copy' onclick='copyLink(\"" + ep.link + "\")'>Copy</button>" +
                            "<a class='btn' href='" + ep.link + "' target='_blank'>Open</a>" +
                        "</div>" +
                    "</div>";
        }

        if (html !== "") { html += "</div>"; }
        contentDiv.innerHTML = html;
    }

    window.copyLink = function(url) {
        var textarea = document.createElement("textarea");
        textarea.value = url;
        textarea.style.position = "fixed";  
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            alert("Ссылка скопирована!");
        } catch (err) {
            alert("Не удалось скопировать");
        }
        document.body.removeChild(textarea);
    };

    loadData();
</script>

</body>
</html>
