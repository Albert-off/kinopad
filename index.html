<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad 4 Cinema v2.0</title>
    <style>
        body { 
            background-color: #0F0F0F; color: #E0E0E0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #FFFFFF; }
        .search-box { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 16px; border-radius: 10px; border: 1px solid #2C2C2E; background-color: #1C1C1E; color: #FFFFFF; outline: none; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; font-size: 16px; font-weight: 600; border-radius: 10px; border: none; background-color: #30D158; color: #FFFFFF; cursor: pointer; }
        .player-container { width: 100%; max-width: 800px; height: 450px; border-radius: 14px; overflow: hidden; background-color: #000000; box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7); border: 1px solid #1C1C1E; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
        .info-text { font-size: 13px; color: #8E8E93; text-align: center; margin-top: 5px; max-width: 550px; }
    </style>
</head>
<body>

    <h1>iPad 4 Cinema v2.0</h1>

    <div class="search-box">
        <input type="text" id="kpId" placeholder="Вставьте ID Кинопоиска (например: 435) или IMDb ID...">
        <button onclick="loadPlayer()" class="btn-main">Запустить плеер</button>
        <div class="info-text">
            Чтобы плеер гарантированно открылся на старом iPad без ошибок «404» и «Поток не найден», мы используем прямую инициализацию по ID Кинопоиска. Просто скопируйте цифры из ссылки фильма на Кинопоиске.
        </div>
    </div>

    <div class="player-container">
        <iframe id="cinemaFrame" allowfullscreen playsinline src="about:blank"></iframe>
    </div>

    <script>
        function loadPlayer() {
            let inputVal = document.getElementById('kpId').value.trim();
            const iframe = document.getElementById('cinemaFrame');
                        
            if (!inputVal) {
                alert("Пожалуйста, введите ID фильма или сериала.");
                return;
            }

            // ИСПРАВЛЕНО: Правильный JavaScript синтаксис регулярного выражения для поиска ID
            if (inputVal.includes("kinopoisk.ru")) {
                const match = inputVal.match(/\/film\/(\d+)|\/series\/(\d+)/);
                if (match) {
                    inputVal = match[1] || match[2];
                }
            }

            let targetUrl = "";
            if (inputVal.startsWith("tt")) {
                targetUrl = "https://vidsrc.to/embed/tv/" + inputVal;
            } else {
                targetUrl = "https://vidsrc.cc/v2/embed/kp/" + inputVal;
            }

            iframe.src = targetUrl;
        }
    </script>
</body>
</html>
