<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinopad</title>
    <style>
        body { 
            background-color: #0F0F0F; 
            color: #E0E0E0; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, sans-serif;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        h1 { font-size: 26px; font-weight: 600; margin-bottom: 20px; color: #FFFFFF; }
        
        .container { width: 100%; max-width: 600px; }
        
        /* Группировка сериалов */
        .show-section { margin-bottom: 25px; background: #181818; padding: 15px; border-radius: 8px; }
        .show-title { font-size: 20px; color: #FF9500; margin: 0 0 10px 0; border-bottom: 1px solid #282828; padding-bottom: 5px; }
        .season-title { font-size: 16px; color: #AEAEB2; margin: 10px 0 5px 0; font-weight: bold; }
        
        /* Строка эпизода */
        .episode-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #242426; 
            padding: 10px 12px; 
            margin: 6px 0; 
            border-radius: 6px;
        }
        .episode-info { font-size: 16px; font-weight: 500; color: #FFFFFF; }
        
        /* Кнопки управления (крупные для удобного нажатия пальцем на iPad) */
        .btn-group { display: flex; }
        .btn { 
            background-color: #007AFF; 
            color: white; 
            border: none; 
            padding: 10px 14px; 
            margin-left: 8px; 
            border-radius: 6px; 
            font-size: 14px; 
            cursor: pointer;
            text-decoration: none;
            -webkit-appearance: none; /* Убирает дефолтные стили Safari */
        }
        .btn-copy { background-color: #34C759; }
        
        .loading { color: #8E8E93; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Kinopad</h1>
    <div class="container" id="content">
        <div class="loading">Загрузка эпизодов...</div>
    </div>

<script>
    // ⚠️ ВАЖНО: Замените эту ссылку на ваш адрес на PythonAnywhere!
    var API_URL = "https://albertaudley.pythonanywhere.com/get_episodes";

    function loadData() {
        // Используем старый XMLHttpRequest вместо fetch для поддержки iOS 10
        var xhr = new XMLHttpRequest();
        xhr.open("GET", API_URL, true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    renderList(data);
                } else {
                    document.getElementById("content").innerHTML = "<div class='loading'>Ошибка загрузки данных с сервера.</div>";
                }
            }
        };
        xhr.send();
    }

    function renderList(episodes) {
        var contentDiv = document.getElementById("content");
        if (episodes.length === 0) {
            contentDiv.innerHTML = "<div class='loading'>Эпизодов пока нет.</div>";
            return;
        }

        var html = "";
        var currentShow = "";
        var currentSeason = "";

        for (var i = 0; i < episodes.length; i++) {
            var ep = episodes[i];

            // Разделение по Сериалам
            if (currentShow !== ep.show_name) {
                if (currentShow !== "") { html += "</div>"; } // закрываем старую секцию
                currentShow = ep.show_name;
                currentSeason = ""; // Сбрасываем сезон для нового сериала
                html += "<div class='show-section'><h2 class='show-title'>" + currentShow + "</h2>";
            }

            // Разделение по Сезонам внутри сериала
            if (currentSeason !== ep.season) {
                currentSeason = ep.season;
                html += "<div class='season-title'>" + currentSeason + "</div>";
            }

            // Верстка самого эпизода
            html += "<div class='episode-row'>" +
                        "<div class='episode-info'>" + ep.episode_number + "</div>" +
                        "<div class='btn-group'>" +
                            // Экранируем ссылку для передачи в JS
                            "<button class='btn btn-copy' onclick='copyLink(\"" + ep.link + "\")'>Копировать</button>" +
                            "<a class='btn' href='" + ep.link + "' target='_blank'>Открыть</a>" +
                        "</div>" +
                    "</div>";
        }

        if (html !== "") { html += "</div>"; }
        contentDiv.innerHTML = html;
    }

    // Функция копирования ссылок (работает в старых iOS через создание временного textarea)
    window.copyLink = function(url) {
        var textarea = document.createElement("textarea");
        textarea.value = url;
        textarea.style.position = "fixed";  // чтобы не дергался экран
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            alert("Ссылка скопирована!");
        } catch (err) {
            alert("Не удалось скопировать");
        }
        document.body.removeChild(textarea);
    };

    // Запуск загрузки при открытии страницы
    loadData();
</script>

</body>
</html>
